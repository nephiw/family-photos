<div id="photo-grid" 
     hx-get="{% url 'gallery:photo_list' %}?sort={{ sort }}&amp;dir={{ dir }}" 
     hx-trigger="refreshGrid from:body" 
     hx-target="#photo-grid" 
     hx-swap="outerHTML"
     {% if photos %}class="photo-grid-container"{% else %}class="empty-container"{% endif %}>
    
    {% if photos %}
        {% for photo in photos %}
            {% include 'gallery/partials/photo_card.html' with photo=photo %}
        {% endfor %}
    {% else %}
        <div class="empty-state">
            <div class="empty-state-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </div>
            <h2 class="empty-state-text">No Photos Uploaded Yet</h2>
            <p class="empty-state-subtext">Be the first to share a memory from the family event!</p>
            <a href="{% url 'gallery:photo_upload' %}" class="btn btn-pink">
                Upload First Photo
            </a>
        </div>
    {% endif %}
</div>
